// ── VOZ / RECONHECIMENTO DE FALA ─────────
let _vozReconhecimento = null;
let _vozAtiva = false;

function iniciarVoz() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#E8323C;color:white;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;z-index:999';
    t.textContent = '❌ Navegador sem suporte a voz';
    document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
    return;
  }

  const btn = document.getElementById('btnMicrofone');
  const status = document.getElementById('vozStatus');
  const campo = document.getElementById('anVoz');

  // PARAR: se estiver ativo, para e processa
  if (_vozAtiva) {
    _vozAtiva = false;
    if (_vozReconhecimento) { try { _vozReconhecimento.stop(); } catch(e) {} }
    if (btn) { btn.textContent = '🎙️'; btn.style.background = 'var(--surface2)'; btn.style.borderColor = 'var(--border)'; }
    if (status) status.style.display = 'none';
    processarTextoVoz(campo ? campo.value.trim() : '');
    return;
  }

  // INICIAR
  _vozAtiva = true;
  if (btn) { btn.textContent = '⏹️'; btn.style.background = 'rgba(232,50,60,0.2)'; btn.style.borderColor = 'var(--accent)'; }
  if (status) status.style.display = 'block';
  if (campo) { campo.value = ''; campo.placeholder = 'Microfone aberto — fale: nome... sinais... doença... queixa... medicamento...'; }
  // Atualizar status com indicador pulsante
  if (status) {
    status.textContent = '🔴 Microfone aberto — fale quando quiser · toque ⏹️ para parar e processar';
    status.style.display = 'block';
  }

  let finalTexto = '';

  const rec = new SpeechRecognition();
  rec.lang = 'pt-BR';
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 1;
  _vozReconhecimento = rec;

  rec.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalTexto += e.results[i][0].transcript + ' ';
      else interim = e.results[i][0].transcript;
    }
    if (campo) campo.value = (finalTexto + interim).trim();
  };

  rec.onerror = (ev) => {
    if (ev.error === 'network' || ev.error === 'aborted') return; // ignorar erros temporários
    if (ev.error === 'not-allowed') {
      _vozAtiva = false;
      if (btn) { btn.textContent = '🎙️'; btn.style.background = 'var(--surface2)'; }
      if (status) status.style.display = 'none';
      const t = document.createElement('div');
      t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#E8323C;color:white;border-radius:8px;padding:8px 14px;font-size:11px;font-weight:700;z-index:999;max-width:280px;text-align:center';
      t.textContent = '❌ Permita o microfone nas configurações do navegador';
      document.body.appendChild(t); setTimeout(() => t.remove(), 4000);
    }
  };

  rec.onend = () => {
    if (!_vozAtiva) return;
    // Reiniciar imediatamente — Android fecha após silêncio mesmo com continuous=true
    try {
      rec.start();
    } catch(e) {
      // Se falhar, tentar com delay
      setTimeout(() => {
        if (_vozAtiva) {
          try { rec.start(); } catch(e2) {}
        }
      }, 50);
    }
  };

  rec.start();
}

function processarTextoVoz(textoFalado) {
  const campo = document.getElementById('anVoz');
  if (!textoFalado) { if (campo) campo.placeholder = 'Ex: Nome/Idade: Maria, 80; Sinais: PA 200x120; Doencas: HAS, DM; Queixa: Dor no peito'; return; }

  const GATILHOS = {
    nome:   ['nome', 'paciente'],
    sinais: ['sinal', 'sinais', 'vital', 'pressao', 'pa', 'saturacao', 'spo2', 'frequencia', 'fc', 'hgt', 'glicemia'],
    comorb: ['doenca', 'doencas', 'comorbidade', 'historico', 'antecedente', 'tem', 'portador'],
    queixa: ['queixa', 'sintoma', 'sente', 'apresenta', 'reclama'],
  };

  const normalizar = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
  // Unir siglas faladas letra por letra: "i c c" -> "icc"
  let textoNorm = textoFalado
    .replace(/\b([a-z\u00c0-\u024f])\s+([a-z\u00c0-\u024f])\s+([a-z\u00c0-\u024f])\s+([a-z\u00c0-\u024f])\b/gi, '$1$2$3$4')
    .replace(/\b([a-z\u00c0-\u024f])\s+([a-z\u00c0-\u024f])\s+([a-z\u00c0-\u024f])\b/gi, '$1$2$3')
    .replace(/\b([a-z\u00c0-\u024f])\s+([a-z\u00c0-\u024f])\b/gi, '$1$2');
  const txt = normalizar(textoNorm);
  const palavras = txt.split(/\s+/);
  const resultado = { nome: '', sinais: '', comorb: '', queixa: '' };
  let campoAtual = null;
  let conteudo = [];

  let i = 0;
  while (i < palavras.length) {
    let detectou = null;
    for (const [c, gatilhos] of Object.entries(GATILHOS)) {
      for (const g of gatilhos) {
        const gw = g.split(' ');
        if (palavras.slice(i, i + gw.length).join(' ') === g) {
          detectou = { c, skip: gw.length };
          break;
        }
      }
      if (detectou) break;
    }
    if (detectou) {
      if (campoAtual && conteudo.length) { resultado[campoAtual] = conteudo.join(' ').trim(); conteudo = []; }
      campoAtual = detectou.c;
      i += detectou.skip;
    } else {
      if (campoAtual) conteudo.push(palavras[i]);
      i++;
    }
  }
  if (campoAtual && conteudo.length) resultado[campoAtual] = conteudo.join(' ').trim();

  const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;

  // Processar nome: "Maria oitenta" -> "Maria, 80"
  const numPorExtenso = {'zero':0,'um':1,'uma':1,'dois':2,'tres':3,'quatro':4,'cinco':5,'seis':6,'sete':7,'oito':8,'nove':9,
    'dez':10,'onze':11,'doze':12,'treze':13,'quatorze':14,'quinze':15,'dezesseis':16,'dezessete':17,'dezoito':18,'dezenove':19,
    'vinte':20,'trinta':30,'quarenta':40,'cinquenta':50,'sessenta':60,'setenta':70,'oitenta':80,'noventa':90,'cem':100};
  const converterNome = s => {
    const p = s.trim().split(/\s+/);
    let nome = [], idade = null;
    for (let j = 0; j < p.length; j++) {
      const n = normalizar(p[j]);
      if (numPorExtenso[n] !== undefined) {
        let val = numPorExtenso[n];
        if (p[j+1] && normalizar(p[j+1]) === 'e' && p[j+2] && numPorExtenso[normalizar(p[j+2])] !== undefined) {
          val += numPorExtenso[normalizar(p[j+2])]; j += 2;
        }
        idade = val;
      } else if (/^\d+$/.test(p[j])) {
        idade = parseInt(p[j]);
      } else {
        nome.push(cap(p[j]));
      }
    }
    return idade !== null ? nome.join(' ') + ', ' + idade : nome.join(' ');
  };

  // Processar sinais: "duzentos por cento e vinte" -> "PA 200x120"
  const converterSinais = s => {
    const nums = {'zero':0,'um':1,'uma':1,'dois':2,'tres':3,'quatro':4,'cinco':5,'seis':6,'sete':7,'oito':8,'nove':9,
      'dez':10,'onze':11,'doze':12,'treze':13,'quatorze':14,'quinze':15,'dezesseis':16,'dezessete':17,'dezoito':18,'dezenove':19,
      'vinte':20,'trinta':30,'quarenta':40,'cinquenta':50,'sessenta':60,'setenta':70,'oitenta':80,'noventa':90,
      'cem':100,'cento':100,'duzentos':200,'duzentas':200,'trezentos':300,'quatrocentos':400,'quinhentos':500};
    const p = normalizar(s).split(/\s+/);
    let res = [], j = 0;
    while (j < p.length) {
      if (nums[p[j]] !== undefined) {
        let val = nums[p[j]];
        if (p[j+1] === 'e' && p[j+2] && nums[p[j+2]] !== undefined) { val += nums[p[j+2]]; j += 2; }
        res.push(val);
      } else if (p[j] === 'por' && res.length > 0) {
        res.push('x');
      } else if (p[j] === 'e' && j > 0 && nums[p[j-1]] !== undefined) {
        // skip standalone 'e' between numbers
      } else {
        res.push(p[j].toUpperCase());
      }
      j++;
    }
    return res.join('').replace(/([A-Z]+)(\d)/g,'$1 $2').replace(/(\d)([A-Z])/g,'$1 $2').trim();
  };

  // Processar comorbidades com siglas
  const converterComorb = s => {
    const mapa = {
      'hipertensao':'HAS','has':'HAS','pressao alta':'HAS',
      'diabetes':'DM','dm':'DM','diabetico':'DM','diabetica':'DM',
      'insuficiencia cardiaca':'ICC','icc':'ICC',
      'dpoc':'DPOC','bronquite':'DPOC','enfisema':'DPOC',
      'avc':'AVC','derrame':'AVC',
      'iam':'IAM','infarto':'IAM',
      'fa':'FA','fibrilacao atrial':'FA',
      'irc':'IRC','insuficiencia renal':'IRC',
      'epilepsia':'Epilepsia','asma':'Asma',
      'depressao':'Depress\u00e3o','ansiedade':'Ansiedade',
      'cancer':'C\u00e2ncer','neoplasia':'C\u00e2ncer',
      'hipotireoidismo':'Hipotireoidismo',
      'obesidade':'Obesidade','colesterol alto':'Dislipidemia',
      'hemofilia':'Hemofilia','artrite':'Artrite','hiv':'HIV',
    };
    const termos = normalizar(s).split(/\s*(?:\be\b|,)\s*/).map(t => t.trim()).filter(Boolean);
    return termos.map(t => mapa[t] || cap(t)).join(', ');
  };

  // Montar linha de resumo
  const partes = [];
  if (resultado.nome)   partes.push('Nome/Idade: ' + converterNome(resultado.nome));
  if (resultado.sinais) partes.push('Sinais: ' + converterSinais(resultado.sinais));
  if (resultado.comorb) partes.push('Doen\u00e7as: ' + converterComorb(resultado.comorb));
  if (resultado.queixa) partes.push('Queixa: ' + cap(resultado.queixa));

  if (partes.length === 0) {
    if (campo) campo.value = textoFalado; // mostrar o que foi captado para o Jose Luiz ver
    return;
  }

  const resumo = partes.join('; ');
  if (campo) { campo.value = resumo; campo.style.fontSize = '11px'; }
  _campoPaciente.voz = resumo;

  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#22C97A;color:white;border-radius:8px;padding:10px 16px;font-size:12px;font-weight:700;z-index:999;text-align:center;max-width:300px';
  t.textContent = '\u2705 Ditado registrado!';
  document.body.appendChild(t); setTimeout(() => t.remove(), 2000);
}


// ── CONTADOR DE ATDs ─────────────────────
function atualizarContadorAtd() {
  const hoje = dataHoje();
  const n = atendimentos.filter(a => a.data === hoje).length;
  const badge = document.getElementById('atdCounter');
  if (!badge) return;
  if (n === 0) { badge.style.display = 'none'; return; }
  badge.style.display = 'inline';
  badge.textContent = n + ' ATD' + (n > 1 ? 's hoje' : ' hoje');
}

// ── COMPARTILHAR VIA WHATSAPP ──────────────
function compartilharAtd(key) {
  const a = atendimentos.find(x => (x._id || x.hora + x.nome) === key);
  if (!a) return;
  const partes = (a.queixa || '').split(' | ');
  const sinais = partes[0] || ''; const comorb = partes[1] || ''; const queixa = partes[2] || '';
  let txt = '\uD83D\uDE91 *ECCO SALVA \u2014 Atendimento APH*\n';
  txt += '\uD83D\uDCCB ATD ' + String(a.num).padStart(2,'0') + ' | ' + a.data + ' ' + a.hora + '\n\n';
  txt += '\uD83D\uDC64 *Paciente:* ' + a.nome + '\n';
  if (sinais) txt += '\uD83D\uDCCA *Sinais:* ' + sinais + '\n';
  if (comorb) txt += '\uD83C\uDFE5 *Comorbidades:* ' + comorb + '\n';
  if (queixa) txt += '\uD83D\uDDE3 *Queixa:* ' + queixa + '\n';
  if (a.meds) txt += '\uD83D\uDC8A *Medica\u00e7\u00f5es:* ' + a.meds + '\n';
  if (a.analise && a.analise.hipotese) {
    txt += '\n\uD83C\uDFAF *Hip\u00f3tese:*\n';
    if (a.analise.hipotesePontos && a.analise.hipotesePontos.length)
      a.analise.hipotesePontos.forEach((p,i) => { txt += (i+1) + '. ' + p + '\n'; });
    else txt += a.analise.hipotese + '\n';
  }
  txt += '\n_Enviado pelo Ecco Salva Meds_';
  window.open('https://wa.me/?text=' + encodeURIComponent(txt), '_blank');
}

// ── BUSCA NO HISTÓRICO ─────────────────────
let _filtroAtivo = 'hoje';

function filtroRapido(filtro) {
  _filtroAtivo = filtro;
  // Atualizar visual dos botões
  document.querySelectorAll('.filtro-btn').forEach(b => {
    const ativo = b.getAttribute('data-filtro') === filtro;
    b.style.background = ativo ? 'rgba(59,155,232,0.15)' : 'var(--surface2)';
    b.style.borderColor = ativo ? 'rgba(59,155,232,0.4)' : 'var(--border)';
    b.style.color = ativo ? 'var(--blue)' : 'var(--text-muted)';
  });
  // Limpar busca de texto ao usar filtro rápido
  const campo = document.getElementById('buscaHistorico');
  if (campo) campo.value = '';
  renderHistorico();
}

function filtrarHistorico() {
  _filtroAtivo = ''; // busca de texto desativa filtro rápido
  // Desativar visual de todos botões
  document.querySelectorAll('.filtro-btn').forEach(b => {
    b.style.background = 'var(--surface2)';
    b.style.borderColor = 'var(--border)';
    b.style.color = 'var(--text-muted)';
  });
  renderHistorico();
}

// ── TEMA CLARO/ESCURO ─────────────────────
function toggleTema() {
  const isLight = document.body.classList.toggle('light-mode');
  document.getElementById('btnTema').textContent = isLight ? '\uD83C\uDF19' : '\u2600\uFE0F';
  localStorage_safe_set('ecco_tema', isLight ? 'light' : 'dark');
}

// ── ONLINE / OFFLINE ─────────────────────
function atualizarStatusOnline() {
  const el = document.getElementById('onlineIndicator'); if (!el) return;
  if (navigator.onLine) {
    el.textContent = '\uD83D\uDFE2'; el.style.background = 'rgba(34,201,122,0.15)';
    el.style.color = 'var(--green)'; el.style.borderColor = 'rgba(34,201,122,0.3)'; el.title = 'Online';
  } else {
    el.textContent = '\uD83D\uDD34'; el.style.background = 'rgba(232,50,60,0.15)';
    el.style.color = 'var(--accent)'; el.style.borderColor = 'rgba(232,50,60,0.3)'; el.title = 'Offline';
  }
}
window.addEventListener('online', atualizarStatusOnline);
window.addEventListener('offline', atualizarStatusOnline);

// ── CONFIRMAÇÃO DE SAÍDA ──────────────────
function _temAnaliseEmAndamento() {
  const temDados = !!(
    (document.getElementById('anNome') && document.getElementById('anNome').value.trim()) ||
    (document.getElementById('anSinais') && document.getElementById('anSinais').value.trim()) ||
    (document.getElementById('anQueixa') && document.getElementById('anQueixa').value.trim())
  );
  const temResultado = !!(document.getElementById('anResult') && document.getElementById('anResult').innerHTML.trim());
  return temDados || temResultado;
}

function switchTab(tab, el) {
  const analiseAtiva = document.getElementById('panel-analise') && document.getElementById('panel-analise').classList.contains('active');
  const abasDoFluxo = ['analise', 'maleta', 'sintoma'];
  if (analiseAtiva && !abasDoFluxo.includes(tab) && _temAnaliseEmAndamento() && selecionados.size === 0) {
    abrirModal('\u26a0\ufe0f An\u00e1lise em andamento', 'H\u00e1 dados n\u00e3o salvos. Deseja sair sem salvar?', [
      { label: 'Cancelar', acao: () => fecharModal() },
      { label: 'Sair sem salvar', cor: 'var(--accent)', acao: () => { fecharModal(); _switchTabCore(tab, el); } }
    ]);
    return;
  }
  _switchTabCore(tab, el);
}

// ── INIT ──────────────────────────────────────────
(function() {
  document.querySelectorAll('.tab').forEach(t => {
    const cor = t.getAttribute('data-color') || '#fff';
    t.style.color = cor;
    if (t.classList.contains('active')) t.style.borderBottomColor = cor;
  });
  if (localStorage_safe_get('ecco_tema') === 'light') {
    document.body.classList.add('light-mode');
    const btn = document.getElementById('btnTema'); if (btn) btn.textContent = '🌙';
  }
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('perfil') === 'motorista') {
    document.querySelectorAll('.tab').forEach(t => {
      const oc = t.getAttribute('onclick') || '';
      if (oc.includes('analise') || oc.includes('historico')) t.style.display = 'none';
    });
    setTimeout(() => { const tm = document.querySelector('.tab[onclick*="maleta"]'); if (tm) _switchTabCore('maleta', tm); }, 150);
  }
  setTimeout(atualizarStatusOnline, 100);
  setTimeout(atualizarContadorAtd, 300);

  // Aplicar dados do Firebase quando estiverem prontos
  // Ouvir evento do Firebase e aplicar dados
  document.addEventListener('firebase-loaded', (e) => {
    const docs = e.detail;
    atendimentos.splice(0, atendimentos.length, ...docs);
    atualizarContadorAtd();
    renderHistorico();
  });
})();
