<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ecco Salva Meds</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDsrHYbdbOBlowVtKMWyuLNO9PbZPQRnAg",
    authDomain: "ecco-salva-atendimentos.firebaseapp.com",
    projectId: "ecco-salva-atendimentos",
    storageBucket: "ecco-salva-atendimentos.firebasestorage.app",
    messagingSenderId: "572863021194",
    appId: "1:572863021194:web:e9564cf1703b4edc996d73",
    measurementId: "G-GW37J7H2NK"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Expor funções globais para o app usar
  window._db = db;
  window._fbCollection = collection;
  window._fbAddDoc = addDoc;
  window._fbGetDocs = getDocs;
  window._fbDeleteDoc = deleteDoc;
  window._fbDoc = doc;
  window._fbQuery = query;
  window._fbWhere = where;
  window._fbOrderBy = orderBy;
  window._firebaseReady = true;
  console.log("Firebase conectado!");

  // Carregar atendimentos do Firebase ao iniciar
  try {
    const q = query(collection(db, 'atendimentos'));
    const snap = await getDocs(q);
    const fbAtds = [];
    snap.forEach(d => fbAtds.push({ ...d.data(), _id: d.id }));
    fbAtds.sort((a,b) => (b.ts||0) - (a.ts||0));
    // Salvar no localStorage para o app ler
    localStorage.setItem('ecco_atendimentos', JSON.stringify(fbAtds));
    // Disparar evento customizado para o script principal capturar
    localStorage.setItem('ecco_atendimentos', JSON.stringify(fbAtds));
    document.dispatchEvent(new CustomEvent('firebase-loaded', { detail: fbAtds }));
  } catch(e) {
    console.log('Firebase load error:', e.message);
    const toastErr = document.createElement('div');
    toastErr.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#E8323C;color:white;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:700;z-index:9999';
    toastErr.textContent = 'Firebase erro: ' + e.message;
    document.body.appendChild(toastErr);
    setTimeout(() => toastErr.remove(), 5000);
  }
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root {
    --bg: #0A0F1A; --surface: #111827; --surface2: #1C2637; --surface3: #243044;
    --border: #2A3A52; --text: #E8EFF8; --text-muted: #7A92B0; --text-dim: #4A6080;
    --accent: #E8323C; --blue: #3B9BE8; --green: #22C97A; --yellow: #F5C842; --orange: #FF6B35; --purple: #A78BFA;
  }
  body.light-mode {
    --bg: #F0F4F8; --surface: #FFFFFF; --surface2: #E8EFF8; --surface3: #D8E4F0;
    --border: #C0D0E0; --text: #0A1628; --text-muted: #4A6080; --text-dim: #7A92B0;
    --accent: #E8323C; --blue: #2A80CC; --green: #18A060; --yellow: #D4A800; --orange: #E05020; --purple: #7B6BD4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 14px 10px; position: sticky; top: 0; z-index: 100; }
  .header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .logo-img { height: 32px; width: auto; }
  .header-title { font-size: 16px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; }
  .header-title span { color: var(--accent); }

  .tabs { display: flex; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 4px; }
  .tab { flex: 1; padding: 6px 2px; border-radius: 5px; border: none; background: transparent; font-family: 'Inter', sans-serif; font-size: 10.5px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-align: center; white-space: nowrap; border-bottom: 2px solid transparent; opacity: 0.7; }
  .tab.active { background: transparent; opacity: 1; }

  .main { padding: 10px 12px 80px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* SEL BAR */
  .sel-bar { display: none; align-items: center; gap: 7px; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 8px 11px; margin-bottom: 0; }
  .sel-sticky-wrap { display: none; position: fixed; bottom: 20px; right: 14px; z-index: 89; }
  .sel-sticky-wrap.show { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .sel-bar.show { display: flex; }
  .sel-count { font-size: 11px; font-weight: 800; background: var(--accent); color: white; border-radius: 20px; padding: 2px 8px; flex-shrink: 0; }
  .sel-names { flex: 1; font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sel-clear { background: transparent; border: none; color: var(--text-dim); font-size: 15px; cursor: pointer; }
  .btn-analisar { display: none; width: 100%; padding: 12px; border-radius: 9px; border: none; background: var(--accent); color: white; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
  .btn-analisar.show { display: block; }

  /* MED GRID COMPACTO */
  .med-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .med-chip {
    background: var(--surface2); border: 1.5px solid var(--border); border-radius: 7px;
    padding: 6px 10px; font-size: 12px; font-weight: 600; color: var(--text-muted);
    cursor: pointer; transition: all 0.12s; user-select: none; display: flex; align-items: center; gap: 4px;
  }
  .med-chip:active { transform: scale(0.95); }
  .med-chip.selected { background: rgba(232,50,60,0.18); border-color: var(--accent); color: var(--text); }
  .med-chip .ck { font-size: 10px; display: none; }
  .med-chip.selected .ck { display: inline; color: var(--accent); }
  .med-chip .first-letter { color: var(--blue); font-weight: 800; font-size: 13px; }
  .med-chip.new-letter { border-left: 2px solid var(--blue); }
  .med-chip.favorito { }
  .med-chip .star { font-size: 10px; display: none; margin-left: 3px; cursor: pointer; }
  .med-chip.favorito .star { display: inline; }

  /* BUSCA */
  .search-wrap { position: relative; margin-bottom: 8px; }
  .search-input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 9px; padding: 10px 46px 10px 13px; font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text); outline: none; }
  .search-input:focus { border-color: var(--blue); }
  .search-input::placeholder { color: var(--text-dim); }
  .search-btn { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); width: 35px; height: 35px; background: var(--blue); border: none; border-radius: 7px; color: white; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .search-btn:disabled { opacity: 0.4; }
  .search-hint { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }

  /* LOADING */
  .loading-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 44px 16px; }
  .pulse-ring { width: 42px; height: 42px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text); }

  /* CARDS RESULTADO */
  .med-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
  .med-card-header { padding: 10px 13px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .med-card-name { font-size: 14px; font-weight: 700; }
  .med-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; background: rgba(34,201,122,0.15); color: var(--green); border: 1px solid rgba(34,201,122,0.3); flex-shrink: 0; white-space: nowrap; }
  .med-card-body { padding: 10px 13px; display: flex; flex-direction: column; gap: 8px; }
  .row-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: #60BFFF; margin-bottom: 2px; }
  .row-val { font-size: 13px; color: var(--text); line-height: 1.5; }
  .divider { height: 1px; background: var(--border); }

  .interacao-box { background: rgba(232,50,60,0.07); border: 1px solid rgba(232,50,60,0.2); border-radius: 7px; padding: 8px 11px; }
  .interacao-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--accent); margin-bottom: 5px; }
  .interacao-item { font-size: 12px; color: var(--text); line-height: 1.5; padding: 3px 0; border-bottom: 1px solid rgba(232,50,60,0.1); }
  .interacao-item:last-child { border-bottom: none; }
  .interacao-item strong { color: var(--yellow); }

  .fatal-box { background: rgba(232,50,60,0.15); border: 1.5px solid var(--accent); border-radius: 7px; padding: 8px 11px; }
  .fatal-title { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.7px; color: var(--accent); margin-bottom: 4px; }
  .fatal-text { font-size: 12px; color: var(--text); font-weight: 600; line-height: 1.5; }

  .compat-card { background: var(--surface); border: 1.5px solid rgba(59,155,232,0.35); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
  .compat-header { background: rgba(59,155,232,0.1); padding: 9px 13px; border-bottom: 1px solid rgba(59,155,232,0.2); font-size: 13px; font-weight: 700; color: var(--blue); }
  .compat-body { padding: 10px 13px; font-size: 13px; color: var(--text); line-height: 1.6; }

  .btn-voltar { display: flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 7px 11px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
  .error-box { background: rgba(232,50,60,0.08); border: 1px solid rgba(232,50,60,0.25); border-radius: 9px; padding: 13px; text-align: center; font-size: 13px; color: var(--accent); }

  /* PATIENT FORM */
  .pac-form { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 12px; margin-bottom: 10px; }
  .pac-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--accent); margin-bottom: 8px; }
  .pac-row { display: flex; gap: 7px; margin-bottom: 7px; }
  .pac-row:last-child { margin-bottom: 0; }
  .pac-field { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .pac-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #60BFFF; }
  .pac-input { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 7px; padding: 7px 10px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text); outline: none; width: 100%; }
  .pac-input:focus { border-color: var(--accent); }
  .pac-input::placeholder { color: var(--text-dim); }
  textarea.pac-input { min-height: 52px; resize: none; line-height: 1.4; }

  /* SAVE BOX */
  .save-box { background: var(--surface2); border: 1.5px solid var(--accent); border-radius: 10px; padding: 11px 12px; margin-top: 12px; }
  .save-title { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .btn-save { width: 100%; padding: 10px; border-radius: 8px; border: none; background: var(--green); color: white; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .btn-save:hover { background: #1a6b41; }

  /* HISTÓRICO PACIENTES */
  .atd-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; margin-bottom: 9px; cursor: pointer; transition: border-color .2s; }
  .atd-card:hover { border-color: var(--accent); }
  .atd-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .atd-num { font-family: monospace; font-size: 11px; font-weight: 700; color: var(--accent); }
  .atd-time { font-size: 10px; color: var(--text-dim); }
  .atd-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .atd-prev { font-size: 11px; color: var(--text); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .empty-txt { text-align: center; padding: 32px 16px; font-size: 13px; color: var(--text-dim); }

  /* MODAL */
  .modal-ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 200; overflow-y: auto; padding: 14px 14px; box-sizing: border-box; text-align: center; }
  .modal-ov.open { display: block; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; max-width: 480px; width: 100%; margin: 0 auto; position: relative; box-sizing: border-box; text-align: left; display: inline-block; }
  .modal-close { position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; background: var(--surface2); border: none; border-radius: 6px; color: var(--text-muted); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  /* SINTOMA TAB */
  .sintoma-chip {
    display: block; width: 100%; text-align: left;
    background: var(--surface); border: 1.5px solid var(--border); border-left-width: 4px;
    border-radius: 8px; padding: 10px 12px; margin-bottom: 7px;
    font-size: 13px; font-weight: 600; color: var(--text);
    cursor: pointer; transition: all 0.15s;
  }
  .sintoma-chip:active { transform: scale(0.98); }
  .sintoma-chip .sintoma-sub { font-size: 11px; font-weight: 400; color: var(--text); margin-top: 2px; }

  /* SEGURANÇA TAB */
  .seg-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
  .seg-header { background: var(--surface2); padding: 10px 13px; font-size: 14px; font-weight: 700; border-bottom: 1px solid var(--border); }
  .seg-body { padding: 11px 13px; display: flex; flex-direction: column; gap: 9px; }
  .seg-block-title { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
  .seg-block-title.fatal { color: var(--accent); }
  .seg-block-title.grave { color: var(--orange); }
  .seg-block-title.incompat { color: var(--yellow); }
  .seg-block-title.erro { color: var(--purple); }
  .seg-item { font-size: 12.5px; color: var(--text); line-height: 1.5; padding: 3px 0 3px 4px; border-left: 2px solid var(--border); margin-bottom: 3px; }
  .seg-item.fatal-item { border-left-color: var(--accent); }
  .seg-item.grave-item { border-left-color: var(--orange); }
  .seg-item.incompat-item { border-left-color: var(--yellow); }
  .seg-item.erro-item { border-left-color: var(--purple); }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ANÁLISE CLÍNICA */
  .an-section { margin-bottom: 10px; }
  .an-header { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px 10px 0 0; padding: 9px 13px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .7px; }
  .an-body { background: var(--surface); border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; padding: 11px 13px; font-size: 13px; color: var(--text); line-height: 1.6; }
  .an-diag { background: rgba(59,155,232,0.08); border: 1.5px solid rgba(59,155,232,0.35); border-radius: 10px; overflow:hidden; margin-bottom:10px; }
  .an-diag-header { background: rgba(59,155,232,0.15); padding: 9px 13px; font-size: 13px; font-weight: 800; color: var(--blue); }
  .an-diag-body { padding: 11px 13px; font-size: 13px; color: var(--text); line-height: 1.6; }
  .an-alerta { background: rgba(232,50,60,0.08); border: 1.5px solid rgba(232,50,60,0.3); border-radius: 10px; overflow:hidden; margin-bottom:10px; }
  .an-alerta-header { background: rgba(232,50,60,0.15); padding: 9px 13px; font-size: 12px; font-weight: 800; text-transform:uppercase; letter-spacing:.7px; color: var(--accent); }
  .an-alerta-body { padding: 11px 13px; font-size: 13px; color: var(--text); line-height: 1.6; }
  .an-conduta { background: rgba(34,201,122,0.07); border: 1.5px solid rgba(34,201,122,0.3); border-radius: 10px; overflow:hidden; margin-bottom:10px; }
  .an-conduta-header { background: rgba(34,201,122,0.15); padding: 9px 13px; font-size: 12px; font-weight: 800; text-transform:uppercase; letter-spacing:.7px; color: var(--green); }
  .an-conduta-body { padding: 11px 13px; font-size: 13px; color: var(--text); line-height: 1.6; }
  .an-disclaimer { font-size: 10px; color: var(--text-dim); text-align:center; padding: 8px 12px; border-top: 1px solid var(--border); margin-top: 6px; }
</style>
</head>

let selecionados = new Set();
let _modoEstudo = false;
let _favoritos = new Set(); // inicializado após localStorage_safe_get

// ── RENDER MALETA (dados locais, sem IA) ──
function renderMaleta() {
  const grid = document.getElementById('maletaGrid');
  let html = '';
  let letraAtual = '';
  MEDS.forEach(med => {
    const letra = med[0].toUpperCase();
    const isNovaLetra = letra !== letraAtual;
    if (isNovaLetra) letraAtual = letra;
    const nomeExibido = isNovaLetra
      ? `<span class="first-letter">${med[0]}</span>${med.slice(1)}`
      : med;
    const isFav = _favoritos.has(med);
    html += `<div class="med-chip${isNovaLetra ? ' new-letter' : ''}${isFav ? ' favorito' : ''}" data-med="${med}" onclick="toggleMed('${med}',this)"><span class="ck">✓</span>${nomeExibido}${isFav ? '<span class="star">⭐</span>' : ''}</div>`;
  });
  grid.innerHTML = `<div class="med-grid">${html}</div>
    <div style="margin-top:12px;padding:8px 4px 0;display:flex;align-items:center;justify-content:space-between;gap:8px;background:transparent">
      <div style="font-size:11px;color:var(--text-muted);line-height:1.4">Toque para ver a ficha<br><span style="color:var(--blue)">Modo Estudo</span> para comparar interações</div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button id="btnModoEstudo" onclick="toggleModoEstudo()" style="background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:7px 12px;font-size:11px;font-weight:700;color:var(--text-muted);cursor:pointer;font-family:Inter,sans-serif;white-space:nowrap">📚 Modo Estudo</button>
        <button onclick="abrirTabelaInteracoes()" style="background:rgba(232,50,60,0.1);border:1px solid rgba(232,50,60,0.35);border-radius:20px;padding:7px 12px;font-size:11px;font-weight:700;color:var(--accent);cursor:pointer;font-family:Inter,sans-serif;white-space:nowrap">⚠️ Interações</button>
      </div>
    </div>
`;

  // Long press para favoritar (mobile)
  let _lpTimer = null;
  grid.addEventListener('touchstart', e => {
    const chip = e.target.closest('.med-chip');
    if (!chip) return;
    const med = chip.getAttribute('data-med');
    if (!med) return;
    _lpTimer = setTimeout(() => {
      _lpTimer = null;
      toggleFavorito(med, e);
      if (navigator.vibrate) navigator.vibrate(50);
    }, 600);
  }, { passive: true });
  grid.addEventListener('touchend', () => { if (_lpTimer) { clearTimeout(_lpTimer); _lpTimer = null; } });
  grid.addEventListener('touchmove', () => { if (_lpTimer) { clearTimeout(_lpTimer); _lpTimer = null; } });

  // Marcar chips que já estão selecionados (da análise ou maleta)
  // Recombinar selecionados com _recsMarcaradas + _maletaExtras antes de marcar
  selecionados.clear();
  _recsMarcaradas.forEach(n => selecionados.add(n));
  _maletaExtras.forEach(n => selecionados.add(n));
  if (selecionados.size > 0) {
    grid.querySelectorAll('.med-chip').forEach(c => {
      const onclick = c.getAttribute('onclick') || '';
      const match = onclick.match(/toggleMed\(['"]([^'"]+)['"]/);
      if (match && selecionados.has(match[1])) c.classList.add('selected');
    });
    atualizarBar();
  }
}

function temDadosPaciente() {
  const voz    = document.getElementById('anVoz')    && document.getElementById('anVoz').value.trim();
  const nome   = document.getElementById('anNome')   && document.getElementById('anNome').value.trim();
  const sinais = document.getElementById('anSinais') && document.getElementById('anSinais').value.trim();
  const queixa = document.getElementById('anQueixa') && document.getElementById('anQueixa').value.trim();
  const meds   = document.getElementById('anMedsContinuos') && document.getElementById('anMedsContinuos').value.trim();
  return !!(voz || nome || sinais || queixa || meds || _campoPaciente.voz || _ultimaAnalise);
}

function toggleMed(nome, el) {
  // Checar contraindicação em qualquer modo
  const alertaContra = checarContraindicacoes(nome);
  if (alertaContra) {
    const overlay = document.createElement('div');
    overlay.id = '_contraOverlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
    overlay.innerHTML = `
      <div style="background:#111827;border:1.5px solid rgba(245,200,66,0.5);border-radius:12px;padding:20px;max-width:320px;width:100%">
        <div style="font-size:12px;font-weight:800;text-transform:uppercase;color:#F5C842;margin-bottom:10px">⚠️ Contraindicação identificada</div>
        <div style="font-size:13px;color:#E8EFF8;margin-bottom:16px;line-height:1.5">${alertaContra}</div>
        <div style="display:flex;gap:8px">
          <button id="_btnCancelarContra" style="flex:1;padding:9px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:13px;cursor:pointer;font-family:Inter,sans-serif">Cancelar</button>
          <button id="_btnMesmoAssim" style="flex:1;padding:9px;border-radius:7px;border:none;background:#E8323C;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif">Mesmo assim</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById('_btnCancelarContra').onclick = () => overlay.remove();
    document.getElementById('_btnMesmoAssim').onclick = () => { overlay.remove(); _continuarToggle(nome, el); };
    return;
  }
  _continuarToggle(nome, el);
}

function _continuarToggle(nome, el) {
  if (_modoEstudo) {
    if (selecionados.has(nome)) {
      selecionados.delete(nome); _maletaExtras.delete(nome);
      if (el) el.classList.remove('selected');
    } else {
      selecionados.add(nome); _maletaExtras.add(nome);
      if (el) el.classList.add('selected');
    }
    atualizarBar(); verificarInteracoes(); return;
  }
  if (!temDadosPaciente()) { mostrarFichaConsulta(nome); return; }
  if (!el) {
    document.querySelectorAll('.med-chip').forEach(c => {
      if (c.getAttribute('onclick') && c.getAttribute('onclick').includes(nome)) el = c;
    });
  }
  if (selecionados.has(nome)) {
    // Desmarcar
    selecionados.delete(nome);
    _recsMarcaradas.delete(nome);
    _maletaExtras.delete(nome);
    if (el) el.classList.remove('selected');
    // Desmarcar checkbox na análise se existir
    const recs = window._recsParaVerDetalhe || [];
    recs.forEach((m, i) => {
      if ((m.nome || m) === nome) {
        const cb = document.getElementById('rec_' + i);
        if (cb) { cb.checked = false; _checkboxState['rec_' + i] = false; }
      }
    });
  } else {
    selecionados.add(nome);
    if (el) el.classList.add('selected');
    // Verificar se está nas recomendadas
    const recsM = window._recsParaVerDetalhe || [];
    let eraRec = false;
    recsM.forEach((m, idx) => {
      if ((m.nome || m) === nome) {
        eraRec = true;
        const cb = document.getElementById('rec_' + idx);
        if (cb) { cb.checked = true; _checkboxState['rec_' + idx] = true; }
        _recsMarcaradas.add(nome);
      }
    });
    // Se não era recomendada, é extra da maleta
    if (!eraRec) _maletaExtras.add(nome);
  }
  atualizarBar();
}

function mostrarFichaConsulta(nome) {
  const panel = document.getElementById('panel-maleta');
  const html = `
    <button class="btn-voltar" onclick="voltarMaleta()">← Voltar</button>
    ${buildCardFromDB(nome)}`;
  panel.innerHTML = html;
}

function atualizarBar() {
  if (typeof verificarInteracoes === 'function') setTimeout(verificarInteracoes, 50);
  // Garantir que selecionados tem TUDO: recs marcadas + extras da maleta
  _recsMarcaradas.forEach(n => selecionados.add(n));
  _maletaExtras.forEach(n => selecionados.add(n));
  const n = selecionados.size;
  const wrap = document.getElementById('selStickyWrap');
  const btn  = document.getElementById('btnAnalisar');
  const cnt  = document.getElementById('selCount');
  const nms  = document.getElementById('selNames');

  if (!wrap) return;

  const salvarFixo = document.getElementById('salvarFixoWrap');
  if (n === 0 || !temDadosPaciente()) {
    wrap.classList.remove('show');

// Tabela expandida de incompatibilidades físico-químicas verificadas
const INCOMPAT_FRASCO = {
  // Formato: 'MedA|MedB': 'motivo'
  'Amiodarona|SF': 'Amiodarona precipita em SF 0,9% — usar APENAS SG5%',
  'Amiodarona|Bicarbonato de Sódio': 'Precipitação imediata — não misturar',
  'Amiodarona|Furosemida': 'Precipitação — administrar separados',
  'Fenitoína|SG5': 'Fenitoína precipita com glicose — usar APENAS SF 0,9%',
  'Fenitoína|Glicose': 'Fenitoína precipita com glicose',
  'Bicarbonato de Sódio|Gluconato de Cálcio': 'Precipitação de carbonato de cálcio — NUNCA misturar',
  'Bicarbonato de Sódio|Dopamina': 'Dopamina é inativada pelo bicarbonato',
  'Bicarbonato de Sódio|Adrenalina': 'Adrenalina é inativada pelo bicarbonato',
  'Diazepam Injetável|SF': 'Diazepam EV adsorve no PVC — lavar acesso imediatamente após',
  'Diazepam Injetável|SG5': 'Precipitação — não diluir em soluções aquosas',
  'Dipirona|Clorpromazina': 'Hipotensão grave — não associar no mesmo frasco',
  'Metoclopramida|Prometazina': 'Reações extrapiramidais somadas — não associar',
  'Furosemida|Amiodarona': 'Precipitação',
  'Ondansetrona|Amiodarona': 'Prolongamento do QT — evitar associação',
  'Haloperidol|Ondansetrona': 'Prolongamento do QT — não misturar',
  'Tramadol|Diazepam Injetável': 'Precipitação — administrar separados',
  'Dopamina|Bicarbonato de Sódio': 'Dopamina inativada',
  'Adrenalina|Bicarbonato de Sódio': 'Adrenalina inativada',
};

function checarCompatibilidadeLocal(nomes) {
  if (nomes.length < 2) return null;
  let avisos = [];

  // Verificar tabela expandida
  for (let i = 0; i < nomes.length; i++) {
    for (let j = i+1; j < nomes.length; j++) {
      const chave1 = nomes[i] + '|' + nomes[j];
      const chave2 = nomes[j] + '|' + nomes[i];
      const motivo = INCOMPAT_FRASCO[chave1] || INCOMPAT_FRASCO[chave2];
      if (motivo) {
        avisos.push('<strong>' + nomes[i] + ' + ' + nomes[j] + ':</strong> ' + motivo);
      } else {
        // Verificar interações do MEDS_DB
        const a = MEDS_DB[nomes[i]];
        const b = MEDS_DB[nomes[j]];
        if (a && b) {
          const aInterage = a.interacoes && a.interacoes.find(int => nomes[j].includes(int.med.split('/')[0].split(' ')[0]) || int.med.includes(nomes[j].split(' ')[0]));
          const bInterage = b.interacoes && b.interacoes.find(int => nomes[i].includes(int.med.split('/')[0].split(' ')[0]) || int.med.includes(nomes[i].split(' ')[0]));
          if (aInterage) avisos.push('<strong>' + nomes[i] + ' + ' + nomes[j] + ':</strong> ' + aInterage.risco);
          else if (bInterage) avisos.push('<strong>' + nomes[j] + ' + ' + nomes[i] + ':</strong> ' + bInterage.risco);
        }
      }
    }
  }

  if (avisos.length > 0) {
    return '<span style="color:var(--accent);font-weight:700">❌ NÃO administrar juntos</span><br><br>' + avisos.join('<br><br>') + '<br><br>Administre em acessos ou horários separados.';
  }
  return '<span style="color:var(--green);font-weight:700">✅ Sem incompatibilidade conhecida</span><br><br>Na dúvida, prefira administrar separadamente. Sempre confirme a diluição individual de cada um.';
}

async function salvarAtd() {
  const vozTextoAtd = (document.getElementById('anVoz') && document.getElementById('anVoz').value.trim()) || _campoPaciente.voz || '';
  // Extrair nome do texto livre (primeira parte antes de hífen ou ponto e vírgula)
  let nomeVal = _pacNome || 'Não identificado';
  if (vozTextoAtd) {
    const mNome = vozTextoAtd.match(/Nome\/Idade:\s*([^;\-\n]+)/i) || vozTextoAtd.match(/^([^;\-\n]+)/);
    if (mNome) nomeVal = mNome[1].trim() || nomeVal;
  }
  const nome   = formatarNomeIdade(nomeVal);
  const idade  = '';
  // Extrair dados do texto para exibicao no card
  let queixa = '';
  if (vozTextoAtd) {
    const linhas = vozTextoAtd.split('\n').map(l => l.trim()).filter(Boolean);
    const partes = [];
    linhas.forEach(l => {
      if (/sinal vital/i.test(l)) partes.push(l.replace(/^[^:]+:\s*/i,'').trim());
      else if (/doen/i.test(l)) partes.push(l.replace(/^[^:]+:\s*/i,'').trim());
      else if (/queixa/i.test(l)) partes.push(l.replace(/^[^:]+:\s*/i,'').trim());
    });
    queixa = partes.length ? partes.join(' | ') : vozTextoAtd.substring(0, 80);
  }
  const tempoAtd = tempoAtendimento();
  const meds  = [...selecionados].join(', ');

  const hoje = dataHoje();
  const atdHoje = atendimentos.filter(a => a.data === hoje);
  const num = atdHoje.length + 1;
  const hora = horaAgora();

  const atd = { num, data: hoje, hora, nome, idade, queixa, meds, analise: _ultimaAnalise, ts: Date.now() };

  // Salvar localmente
  atendimentos.unshift(atd);
  localStorage_safe_set('ecco_atendimentos', JSON.stringify(atendimentos));

  // Salvar no Firebase (nuvem)
  if (window._firebaseReady) {
    try {
      await window._fbAddDoc(window._fbCollection(window._db, 'atendimentos'), atd);
      console.log("Salvo na nuvem!");
    } catch(e) {
      console.warn("Erro ao salvar na nuvem:", e);
    }
  }

  voltarMaleta();

  // Limpar campos da aba Análise para o próximo paciente
  const limparCampo = id => { const el = document.getElementById(id); if (el) el.value = ''; };
  limparCampo('anNome');
  limparCampo('anSinais');
  limparCampo('anComorbidades');
  limparCampo('anQueixa');
  _recsMarcaradas.clear();
  selecionados.clear();
  window._recsParaVerDetalhe = [];
  _campoPaciente = { nome: '', sinais: '', comorb: '', queixa: '' };
  _checkboxState = {};
  _maletaExtras.clear();
  limparFotos();
  _ultimaAnalise = null;
  document.getElementById('anResult').innerHTML = '';

  // Esconder pills fixos
  const sf3 = document.getElementById('salvarFixoWrap');
  if (sf3) sf3.style.display = 'none';
  const sw = document.getElementById('selStickyWrap');
  if (sw) sw.classList.remove('show');

  // Limpar completamente o painel análise — novo paciente
  window._analiseHtmlAnterior = null;
  window._recsParaVerDetalhe = [];
  _ultimaAnalise = null;
  _campoPaciente = { nome: '', sinais: '', comorb: '', queixa: '' };
  _checkboxState = {};
  _maletaExtras.clear();
  const panelAn = document.getElementById('panel-analise');
  _campoPaciente = { nome: '', sinais: '', comorb: '', queixa: '' };
  _checkboxState = {};
  _maletaExtras.clear();
  if (panelAn) {
    panelAn.innerHTML = buildFormularioAnalise();
    _campoPaciente.voz = '';
  }
  limparFotos();
  // Garantir que a aba análise está ativa
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.remove('active');
    t.style.borderBottomColor = 'transparent';
  });
  const panelAnalise = document.getElementById('panel-analise');
  if (panelAnalise) panelAnalise.classList.add('active');
  const tabAnalise = document.querySelector('.tab[onclick*="analise"]');
  if (tabAnalise) {
    tabAnalise.classList.add('active');
    const cor = tabAnalise.getAttribute('data-color') || '#60BFFF';
    tabAnalise.style.color = cor;
    tabAnalise.style.borderBottomColor = cor;
  }
  window.scrollTo(0, 0);

  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#22C97A;color:white;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;z-index:999';
  t.textContent = `✅ Atendimento ${String(num).padStart(2,'0')} salvo!`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
  atualizarContadorAtd();
}

async function deletarAtd(idx) {
  const hoje = dataHoje();
  const atdHoje = atendimentos.filter(a => a.data === hoje);
  const atd = atdHoje[idx];
  if (!confirm(`Deletar atendimento de ${atd.nome}?`)) return;

  // Deletar do Firebase se tiver ID
  if (window._firebaseReady && atd._id) {
    try {
      await window._fbDeleteDoc(window._fbDoc(window._db, 'atendimentos', atd._id));
    } catch(e) { console.warn("Erro ao deletar da nuvem:", e); }

  // Sempre deleta do local independente do Firebase
  const idxGlobal = atendimentos.indexOf(atd);
  atendimentos.splice(idxGlobal, 1);
  localStorage_safe_set('ecco_atendimentos', JSON.stringify(atendimentos));

  // Atualizar lista sem recarregar do Firebase
  const lista = document.getElementById('listaAtd');

async function renderHistorico() {
  const hoje = dataHoje();
  document.getElementById('dataHoje').textContent = hoje;
  const termoBuscaLabel = (document.getElementById('buscaHistorico') || {value:''}).value.trim();
  const labelEl = document.getElementById('labelHistorico');
  if (labelEl) labelEl.innerHTML = termoBuscaLabel
    ? 'Resultados para: <span style="color:var(--blue)">' + termoBuscaLabel + '</span>'
    : 'Atendimentos — <span id="dataHoje">' + hoje + '</span>';
  const lista = document.getElementById('listaAtd');
  lista.innerHTML = '<div class="empty-txt">Carregando...</div>';

  // Firebase com timeout de 4s — se não responder usa local
  if (window._firebaseReady) {
    try {
      const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 4000));
      const snap = await Promise.race([
        window._fbGetDocs(window._fbCollection(window._db, 'atendimentos')),
        timeout
      ]);
      const docsNuvem = [];
      snap.forEach(d => docsNuvem.push({ _id: d.id, ...d.data() }));
      atendimentos = docsNuvem.sort((a,b) => {
        if (a.data < b.data) return 1;
        if (a.data > b.data) return -1;
        return a.hora < b.hora ? 1 : -1;
      });
      localStorage_safe_set('ecco_atendimentos', JSON.stringify(atendimentos));
    } catch(e) {
      console.warn("Firebase indisponível — usando dados locais");
    }
  }

  // Filtrar atendimentos
  const termoBusca = (document.getElementById('buscaHistorico') || {value:''}).value.trim().toLowerCase();
  let atdFiltrados;
  let msgVazia = 'Nenhum atendimento encontrado.';

  if (termoBusca) {
    atdFiltrados = atendimentos.filter(a =>
      (a.nome||'').toLowerCase().includes(termoBusca) ||
      (a.data||'').includes(termoBusca) ||
      (a.meds||'').toLowerCase().includes(termoBusca) ||
      (a.queixa||'').toLowerCase().includes(termoBusca)
    );
    msgVazia = 'Nenhum resultado para "' + termoBusca + '".';
  } else {
    const agora = new Date();
    const filtro = typeof _filtroAtivo !== 'undefined' ? _filtroAtivo : 'hoje';
    if (filtro === 'hoje') {
      atdFiltrados = atendimentos.filter(a => a.data === hoje);
      msgVazia = 'Nenhum atendimento registrado hoje.';
    } else if (filtro === 'ontem') {
      const ontem = new Date(agora); ontem.setDate(ontem.getDate()-1);
      const dd = String(ontem.getDate()).padStart(2,'0');
      const mm = String(ontem.getMonth()+1).padStart(2,'0');
      const ontemStr = dd+'/'+mm+'/'+ontem.getFullYear();
      atdFiltrados = atendimentos.filter(a => a.data === ontemStr);
      msgVazia = 'Nenhum atendimento registrado ontem.';
    } else if (filtro === 'semana') {
      const semAgo = new Date(agora); semAgo.setDate(semAgo.getDate()-6);
      atdFiltrados = atendimentos.filter(a => {
        if (!a.data) return false;
        const [d,m,y] = a.data.split('/');
        const dt = new Date(y,m-1,d);
        return dt >= semAgo && dt <= agora;
      });
      msgVazia = 'Nenhum atendimento esta semana.';
    } else if (filtro === 'mes') {
      const mesAtual = String(agora.getMonth()+1).padStart(2,'0') + '/' + agora.getFullYear();
      atdFiltrados = atendimentos.filter(a => (a.data||'').includes(mesAtual));
      msgVazia = 'Nenhum atendimento este mês.';
    } else {
      atdFiltrados = [...atendimentos];
      msgVazia = 'Nenhum atendimento registrado.';
    }
  }

  // Calcular e exibir estatísticas
  calcularStats(atdFiltrados);

  if (atdFiltrados.length === 0) {
    lista.innerHTML = '<div class="empty-txt">' + msgVazia + '</div>';
    return;
  }
  lista.innerHTML = atdFiltrados.map((a, i) => `
    <div class="atd-card">
      <div class="atd-top" onclick="verAtdKey('${a._id || a.hora + a.nome}')" style="cursor:pointer">
        <span class="atd-num">ATD ${String(a.num).padStart(2,'0')} — ${a.hora}</span>
        <span class="atd-time">${a.data}</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
        <div onclick="verAtdKey('${a._id || a.hora + a.nome}')" style="flex:1;cursor:pointer">
          <div class="atd-name">${a.nome}</div>
          <div class="atd-prev" style="color:var(--accent);margin-top:3px">${a.meds}</div>
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0">
        <button onclick="editarAtdKey('${a._id || a.hora + a.nome}')" style="background:rgba(59,155,232,0.12);border:1px solid rgba(59,155,232,0.3);border-radius:6px;color:var(--blue);font-size:11px;font-weight:700;padding:5px 9px;cursor:pointer;font-family:Inter,sans-serif">✏️</button>
        <button onclick="deletarAtdKey('${a._id || a.hora + a.nome}')" style="background:rgba(232,50,60,0.12);border:1px solid rgba(232,50,60,0.3);border-radius:6px;color:var(--accent);font-size:11px;font-weight:700;padding:5px 9px;cursor:pointer;font-family:Inter,sans-serif">🗑️</button>
      </div>
      </div>
    </div>`).join('');
}

function toggleHipDetalhe(id) {
  var el = document.getElementById(id);
  if (!el) return;
  if (el.style.display === 'none' || el.style.display === '') {
    if (!el.innerHTML.trim() && window['_hipDet_' + id]) el.innerHTML = window['_hipDet_' + id];
    el.style.display = 'block';
  } else { el.style.display = 'none'; }
}

function _exibirModal(a) {
  const partes = (a.queixa || '').split(' | ');
  const sinais = partes[0] || '';
  const comorb = partes[1] || '';
  const queixa = partes[2] || '';

  let html = '';
  // Cabeçalho
  html += '<div style="font-size:11px;font-weight:700;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px">ATD ' + String(a.num).padStart(2,'0') + ' — ' + a.data + ' ' + a.hora + '</div>';
  html += '<div style="font-size:16px;font-weight:700;margin-bottom:6px">' + a.nome + '</div>';

  // Linha 1: sinais vitais
  if (sinais) html += '<div style="font-size:12px;color:var(--yellow);margin-bottom:3px">📊 ' + sinais + '</div>';
  // Linha 2: comorbidades + queixa
  const l2 = [comorb ? '🏥 ' + comorb : '', queixa ? '🗣 ' + queixa : ''].filter(Boolean).join(' &nbsp;·&nbsp; ');
  if (l2) html += '<div style="font-size:12px;color:var(--text);margin-bottom:10px">' + l2 + '</div>';

  // Hipótese diagnóstica PRIMEIRO
  if (a.analise && a.analise.hipotese) {
    const idDet = 'hipDet_' + (a._id || a.hora).replace(/[^a-z0-9]/gi,'');
    const temDetalhe = a.analise.hipoteseDetalhe && a.analise.hipoteseDetalhe.trim();
    html += '<div style="background:rgba(59,155,232,0.08);border:1.5px solid rgba(59,155,232,0.3);border-radius:8px;padding:9px 11px;margin-bottom:12px">';
    html += '<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--blue);margin-bottom:5px">🎯 Hipótese diagnóstica</div>';
    // Pontos numerados se disponível
    if (a.analise.hipotesePontos && a.analise.hipotesePontos.length) {
      a.analise.hipotesePontos.forEach(function(p, i) {
        html += '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:5px">' +
          '<span style="color:#E8323C;font-size:15px;font-weight:900;flex-shrink:0">' + (i+1) + '</span>' +
          '<span style="font-size:12px;color:var(--text);line-height:1.4">' + p + '</span></div>';
      });
    } else {
      html += '<div style="font-size:12px;color:var(--text);line-height:1.5">' + a.analise.hipotese + '</div>';
    }
    if (temDetalhe) {
      window['_hipDet_' + idDet] = a.analise.hipoteseDetalhe;
      html += '<span data-hipdet="' + idDet + '" style="color:#60BFFF;font-size:11px;cursor:pointer;display:inline-block;margin-top:4px">▶ saiba mais</span>';
      html += '<div id="' + idDet + '" style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid rgba(59,155,232,0.2);font-size:12px;color:var(--text);line-height:1.7"></div>';
    }
    html += '</div>';
  }

  // Medicamentos administrados com ficha completa
  if (a.meds) {
    const medsList = a.meds.split(',').map(function(m) { return m.trim(); }).filter(Boolean);
    html += '<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--accent);margin-bottom:8px">💉 Medicamentos administrados</div>';
    medsList.forEach(function(nome) { html += buildCardFromDB(nome); });
  }

  // Medicamentos de uso contínuo (foto)
  if (a.analise && a.analise.classes && a.analise.classes.length) {
    const classesHtml = a.analise.classes.map(function(c) {
      return '<div style="margin-bottom:5px"><div style="font-size:10px;font-weight:800;text-transform:uppercase;color:#FF8C00;margin-bottom:2px">' + c.icone + ' ' + c.classe + '</div>' +
        c.itens.map(function(item) { return '<div style="font-size:11px;color:var(--text);padding:1px 0 1px 10px;border-left:2px solid var(--border)">' + item + '</div>'; }).join('') + '</div>';
    }).join('');
    html += '<div style="margin-top:10px"><div class="row-lbl">💊 Uso contínuo (foto)</div><div style="margin-top:5px">' + classesHtml + '</div></div>';
  }

  // Botão WhatsApp
  const chave = a._id || a.hora + a.nome;
  window._compartilharChave = chave;
  html += '<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">' +
    '<button onclick="compartilharAtd(window._compartilharChave)" style="width:100%;padding:11px;border-radius:9px;border:none;background:#25D366;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif">📲 Compartilhar via WhatsApp</button>' +
    '</div>';
  document.getElementById('modalContent').innerHTML = html;
  // Event delegation para saiba mais
  document.getElementById('modalContent').onclick = function(e) {
    const el = e.target.closest('[data-hipdet]');
    if (el) toggleHipDetalhe(el.getAttribute('data-hipdet'));
  };
  document.getElementById('modalOv').classList.add('open');
}

async function callClaude(query, tentativa = 1) {
  const GROQ_KEY = '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';
  let res;
  try {
    res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_KEY },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile', max_tokens: 4000, temperature: 0.3,
        messages: [{ role: 'system', content: SYSTEM_BUSCA }, { role: 'user', content: 'Consulta: ' + query }]
      })
    });
  } catch(netErr) {
    throw new Error('Falha de conexão. Verifique sua internet.');
  }
  if (res.status === 429) {
    if (tentativa <= 3) { await new Promise(r => setTimeout(r, tentativa * 3000)); return callClaude(query, tentativa + 1); }
    throw new Error('Muitas requisições. Aguarde alguns segundos e tente de novo.');
  }
  if (!res.ok) throw new Error('Erro HTTP ' + res.status);
  const data = await res.json();
  const raw = (data?.choices?.[0]?.message?.content || '').trim();
  if (!raw) throw new Error('Resposta inválida');
  let clean = raw.replace(/```[a-z]*\s*/gi, '').replace(/```/g, '').trim();
  const fb = clean.indexOf('{'), lb = clean.lastIndexOf('}');
  if (fb === -1 || lb === -1) throw new Error('JSON não encontrado na resposta');
  return JSON.parse(clean.slice(fb, lb+1));
}

function _switchTabCore(tab, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.remove('active');
    const c = t.getAttribute('data-color') || '#fff';
    t.style.color = c;
    t.style.borderBottomColor = 'transparent';
  });
  document.getElementById('panel-' + tab).classList.add('active');
  el.classList.add('active');
  const cor = el.getAttribute('data-color') || '#fff';
  el.style.color = cor;
  el.style.borderBottomColor = cor;

  if (tab === 'analise') {
    setTimeout(() => {
      // Repor valores — usar cache ou _campoPaciente
      const cache = window._dadosPacienteCache || {};
      const fn = document.getElementById('anNome');
      const fs = document.getElementById('anSinais');
      const fc = document.getElementById('anComorbidades');
      const fq = document.getElementById('anQueixa');
      if (fn && !fn.value) fn.value = _campoPaciente.nome || cache.nome || '';
      if (fs && !fs.value) fs.value = _campoPaciente.sinais || cache.sinais || '';
      if (fc && !fc.value) fc.value = _campoPaciente.comorb || cache.comorb || '';
      if (fq && !fq.value) fq.value = _campoPaciente.queixa || cache.queixa || '';
      // Repor checkboxes
      Object.entries(_checkboxState).forEach(([id, checked]) => {
        const cb = document.getElementById(id);
        if (cb) cb.checked = checked;
      });
      // Repor pill se há seleções
      atualizarBar();
      // Rolar para resultado se existir
      const result = document.getElementById('anResult');
      if (result && result.innerHTML.trim()) {
        result.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }, 50);
  }

  if (tab === 'maleta') {
    window.scrollTo(0, 0);
    // Salvar estado atual dos campos antes de sair da análise
    const fnM = document.getElementById('anNome');
    const fsM = document.getElementById('anSinais');
    const fcM = document.getElementById('anComorbidades');
    const fqM = document.getElementById('anQueixa');
    if (fnM) _campoPaciente.nome   = fnM.value;
    if (fsM) _campoPaciente.sinais = fsM.value;
    if (fcM) _campoPaciente.comorb = fcM.value;
    if (fqM) _campoPaciente.queixa = fqM.value;
    // Resincronizar _recsMarcaradas APENAS se checkboxes existirem no DOM
    const recsAtual = window._recsParaVerDetalhe || [];
    const temCheckboxes = recsAtual.length > 0 && document.getElementById('rec_0') !== null;
    if (temCheckboxes) {
      _recsMarcaradas = new Set();
      recsAtual.forEach((m, i) => {
        const cb = document.getElementById('rec_' + i);
        if (cb && cb.checked) _recsMarcaradas.add(m.nome || m);
      });
    }
    // Recombinar selecionados SEM limpar _maletaExtras
    selecionados.clear();
    _recsMarcaradas.forEach(n => selecionados.add(n));
    _maletaExtras.forEach(n => selecionados.add(n));

    const _mg = document.getElementById('maletaGrid');
    if (!_mg || _mg.children.length === 0) {
      // Grid não existe ou está vazio — renderizar
      if (_mg) { _mg.dataset.loaded = '1'; renderMaleta(); }
    } else if (!_mg.dataset.loaded) {
      _mg.dataset.loaded = '1';
      renderMaleta();
    } else {
      // Grid existe — apenas remarcar chips
      _mg.querySelectorAll('.med-chip').forEach(c => {
        const oc = c.getAttribute('onclick') || '';
        const m = oc.match(/toggleMed\(['"]([^'"]+)['"]/);
        if (m) {
          if (selecionados.has(m[1])) c.classList.add('selected');
          else c.classList.remove('selected');
        }
      });
      atualizarBar();
    }

    // Atualizar indicador de modo

    // Chips serão marcados pelo renderMaleta após render

    // Limpar seleções se não há paciente
    if (!temDadosPaciente()) {
      selecionados.clear();
      _recsMarcaradas.clear();
      _maletaExtras.clear();
      document.querySelectorAll('.med-chip').forEach(c => c.classList.remove('selected'));
    }
    // Mostrar pill salvar se há seleções
    atualizarBar();
    const sf = document.getElementById('salvarFixoWrap');
    if (sf) sf.style.display = selecionados.size > 0 && temDadosPaciente() ? 'block' : 'none';
  }
  if (tab === 'sintoma' && document.getElementById('sintomaGrid') && !document.getElementById('sintomaGrid').dataset.loaded) {
    renderSintomas();
  }
  if (tab === 'seguranca' && document.getElementById('segurancaGrid') && !document.getElementById('segurancaGrid').dataset.loaded) {
    renderSeguranca();
  }
  if (tab === 'historico') {
    renderHistorico();
  }
}

// Formatar texto: siglas em maiúsculo, palavras com 1ª letra maiúscula
function formatarTexto(str) {
  if (!str) return str;
  const siglas = ['PA','FC','FR','SPO2','HGT','ECG','AVC','IAM','PCR','DM','HAS','ICC','DPOC','AVCI','TCE','TVP','TEP','SAMU','APH','SCA','EV','IM','SC','SL','VO','SF','SG','BPM','AAS','RCP','UTI','UPA','UBS','SSVV','GCS','SNS','AVCH','AVE','VM','O2','SAT'];
  return str.split(' ').map(word => {
    if (!word) return word;
    const clean = word.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
    if (siglas.includes(clean)) return word.toUpperCase();
    return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
  }).join(' ');
}
function formatarListaTermos(str) {
  if (!str) return str;
  if (str.includes(',') || str.includes(';')) {
    return str.split(/[,;]/).map(t => formatarTexto(t.trim())).filter(Boolean).join(', ');
  }
  const siglas = ['PA','FC','FR','SPO2','HGT','ECG','AVC','IAM','PCR','DM','HAS','ICC','DPOC','AVCI','TCE','TVP','TEP','SAMU','APH','SCA','EV','IM','SC','SL','VO','SF','SG','BPM','AAS','RCP','UTI','UPA','UBS','SSVV','GCS','SNS','AVCH','AVE','VM','O2','SAT'];
  const conectores = ['de','do','da','dos','das','no','na','nos','nas','e','em','com','sem','por','ao','à','aos','às','tipo','grau','nivel','nível'];
  const palavras = str.trim().split(/\s+/);
  const termos = []; let atual = [];
  for (let i = 0; i < palavras.length; i++) {
    const p = palavras[i];
    const pLow = p.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    const pClean = p.replace(/[^a-zA-Z0-9]/g,'').toUpperCase();
    const eSigla = siglas.includes(pClean);
    const eConector = conectores.includes(pLow);
    if (atual.length > 0 && !eConector) {
      const anteriorClean = atual[atual.length-1].replace(/[^a-zA-Z0-9]/g,'').toUpperCase();
      if (eSigla) { termos.push(atual.join(' ')); atual = []; }
    }
    atual.push(p);
  }
  if (atual.length) termos.push(atual.join(' '));
  return termos.map(t => formatarTexto(t.trim())).filter(Boolean).join(', ');
}

// Formatar campo nome/idade: "maria 80" → "Maria, 80"
function formatarNomeIdade(str) {
  if (!str) return str;
  // Se já tem vírgula, só formata o texto
  if (str.includes(',')) return formatarTexto(str);
  // Separar nome(s) do número (idade)
  const match = str.match(/^(.*?)\s*(\d+)\s*$/);
  if (match) {
    const nome = formatarTexto(match[1].trim());
    return nome + ', ' + match[2];
  }
  return formatarTexto(str);
}

// Formatar sinais vitais: "pa 200x100 fc 110 spo2 94" → "PA 200x100, FC 110, SpO2 94%"
function formatarSinais(str) {
  if (!str) return str;
  if (!str.includes(',')) {
    // Inserir vírgula antes de siglas conhecidas que aparecem após números/letras
    str = str.replace(/\s+(PA|FC|FR|HGT|SPO2|SpO2|SAT|TEMP|TAX)\s+/gi, (m, sig) => ', ' + sig.toUpperCase() + ' ');
  }
  return formatarTexto(str);
}

async function extrairTextoVision(base64) {
  try {
    const resp = await fetch('https://vision.googleapis.com/v1/images:annotate?key=' + VISION_KEY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        requests: [{ image: { content: base64 }, features: [{ type: 'TEXT_DETECTION', maxResults: 1 }] }]
      })
    });
    const data = await resp.json();
    // Verificar erros da API
    if (data?.error) {
      console.error('Vision API error:', data.error);
      mostrarErroOCR('Erro Vision API: ' + data.error.message);
      return '';
    }
    if (data?.responses?.[0]?.error) {
      console.error('Vision response error:', data.responses[0].error);
      mostrarErroOCR('Erro: ' + data.responses[0].error.message);
      return '';
    }
    const texto = data?.responses?.[0]?.fullTextAnnotation?.text || '';
    return texto.trim();
  } catch(e) {
    console.error('Vision fetch error:', e);
    mostrarErroOCR('Erro de conexão com Vision API');
    return '';
  }
}

function anFotoSelecionada(input) {
  const file = input.files[0];
  if (!file) return;
  const mime = 'image/jpeg';

  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = async () => {
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      // Aumentar contraste para melhorar OCR de telas e textos
      const imageData = ctx.getImageData(0, 0, w, h);
      const data = imageData.data;
      const contrast = 1.3; const brightness = 10;
      for (let i = 0; i < data.length; i += 4) {
        data[i]   = Math.min(255, Math.max(0, (data[i]   - 128) * contrast + 128 + brightness));
        data[i+1] = Math.min(255, Math.max(0, (data[i+1] - 128) * contrast + 128 + brightness));
        data[i+2] = Math.min(255, Math.max(0, (data[i+2] - 128) * contrast + 128 + brightness));
      }
      ctx.putImageData(imageData, 0, 0);
      const base64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
      _anFotos.push({ base64, mime });
      renderThumbs();

      // OCR — extrair texto da foto e filtrar apenas nome do medicamento

      res.innerHTML = `<div class="error-box">❌ Resposta inesperada da IA. Tente novamente.</div>`;
      btn.disabled = false;
      return;
    }
    let d;
    try {
      d = JSON.parse(cleanJson.slice(fb, lb + 1));
    } catch(parseErr) {
      res.innerHTML = `<div class="error-box">❌ Erro ao interpretar resposta da IA. Tente novamente.</div>`;
      btn.disabled = false;
      return;
    }

    // Extrair dados do texto livre para exibição organizada
    const vozTextoResult = vozTexto || '';
    const extrairCampo = (texto, ...keys) => {
      for (const k of keys) {
        const m = texto.match(new RegExp(k + '[:\\s]+([^\\n;—\\-]+)', 'i'));
        if (m) return m[1].trim();
      }
      return '';
    };
    const pacNomeExib   = extrairCampo(vozTextoResult, 'Nome/Idade', 'Nome', 'Paciente') || nomeRaw || '';
    const pacSinaisExib = extrairCampo(vozTextoResult, 'Sinal Vital Alterado', 'Sinais? [Vv]itais?', 'Sinais?', 'PA', 'SpO2', 'Satura') || sinaisVal || '';
    const pacDoencaExib = extrairCampo(vozTextoResult, 'Doen[çc]as? Pr[eé]vias?', 'Doen[çc]as?', 'Hist[oó]rico') || comorbVal || '';
    const pacQueixaExib = extrairCampo(vozTextoResult, 'Queixa [Pp]rincipal', 'Queixa', 'Sintoma') || queixaVal || '';

    // Filtro de segurança: manter apenas meds que aparecem no campo digitado
    const medsCont2 = (document.getElementById('anMedsContinuos') || {value:''}).value.trim().toLowerCase();
    if (d.classes_medicamentos && d.classes_medicamentos.length && medsCont2) {
      // Extrair palavras significativas do campo de meds (min 3 letras, sem stopwords)
      const stopwords = ['com', 'para', 'que', 'uso', 'por', 'via', 'oral', 'comprimido'];
      const palavrasMeds = medsCont2.split(/[,\s\/]+/)
        .map(p => p.replace(/[^a-z]/g,''))
        .filter(p => p.length >= 3 && !stopwords.includes(p));
      d.classes_medicamentos = d.classes_medicamentos.map(c => {
        const itensFiltrados = c.itens.filter(item => {
          const itemNorm = item.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
          return palavrasMeds.some(p => {
            const pNorm = p.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
            // Match parcial: "losartan" encontra "Losartana"
            return itemNorm.includes(pNorm) || pNorm.includes(itemNorm.split(' ')[0].substring(0,5));
          });
        });
        return { ...c, itens: itensFiltrados };
      }).filter(c => c.itens.length > 0);
    } else if (!medsCont2) {
      d.classes_medicamentos = [];
    }

    let html = '';

    // Cabeçalho do paciente organizado
    if (pacNomeExib || pacSinaisExib || pacDoencaExib || pacQueixaExib) {
      let pacHtml = '<div style="display:flex;flex-direction:column;gap:3px;margin-bottom:12px;padding:10px 12px;background:var(--surface2);border-radius:10px;border-left:3px solid var(--blue)">';
      if (pacNomeExib)   pacHtml += `<div style="font-size:14px;font-weight:800;color:#FFFFFF">👤 ${pacNomeExib}</div>`;
      if (pacSinaisExib) pacHtml += `<div style="font-size:12px;margin-top:2px"><span style="color:#F5C842;font-weight:700">Sinal Vital Alterado:</span> <span style="color:#FFFFFF">${pacSinaisExib}</span></div>`;
      if (pacDoencaExib) pacHtml += `<div style="font-size:12px"><span style="color:#F5C842;font-weight:700">Doenças Prévias:</span> <span style="color:#FFFFFF">${pacDoencaExib}</span></div>`;
      if (pacQueixaExib) pacHtml += `<div style="font-size:12px"><span style="color:#F5C842;font-weight:700">Queixa Principal:</span> <span style="color:#FFFFFF">${pacQueixaExib}</span></div>`;
      pacHtml += '</div>';
      html += pacHtml;
    }

    // 1. Medicamentos por classe (da foto)
    if (d.classes_medicamentos && d.classes_medicamentos.length) {
      const classesHtml = d.classes_medicamentos.map(c => `
        <div style="margin-bottom:6px">
          <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#FF8C00;margin-bottom:4px">${c.icone} ${c.classe}</div>
          ${c.itens.map(item => `<div style="font-size:12px;color:#E8EFF8;padding:3px 0 3px 12px;border-left:2px solid #3B9BE8">${item}</div>`).join('')}
        </div>`).join('');
      html += `<div class="an-section">
        <div class="an-header" style="color:var(--blue)">💊 Medicamentos identificados</div>
        <div class="an-body" style="padding-top:6px">${classesHtml}</div>
      </div>`;
    }

    // 2. Hipótese diagnóstica — pontos numerados + saiba mais
    const hipPontos   = d.hipotese_pontos   || (d.hipotese_curta ? [d.hipotese_curta] : d.hipotese_diagnostica ? [d.hipotese_diagnostica] : []);
    const hipDetalhada= d.hipotese_detalhada|| '';
    if (hipPontos.length) {
      const idDetalhe = 'hipDetalhe_' + Date.now();
      const pontosHtml = hipPontos.map((p, i) =>
        `<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
          <span style="color:#E8323C;font-size:16px;font-weight:900;line-height:1;flex-shrink:0">${i+1}</span>
          <span style="font-size:13px;font-weight:600;color:var(--text);line-height:1.4">${p}</span>
        </div>`
      ).join('');
      html += `<div class="an-diag">
        <div class="an-diag-header">🎯 Hipótese diagnóstica</div>
        <div class="an-diag-body" style="padding-bottom:6px">${pontosHtml}${hipDetalhada ? `<span onclick="const el=document.getElementById('${idDetalhe}');el.style.display=el.style.display==='none'?'block':'none'" style="color:#60BFFF;font-size:11px;cursor:pointer;font-weight:400;display:inline-block;margin-top:2px">▶ saiba mais</span>` : ''}</div>
        ${hipDetalhada ? `<div id="${idDetalhe}" style="display:none;padding:10px 13px;border-top:1px solid rgba(59,155,232,0.2);font-size:12px;color:var(--text);line-height:1.7">${hipDetalhada}</div>` : ''}
      </div>`;
    }

    // 4. Alertas clínicos — apenas medicamentos que estão na maleta
    const medsDaMaleta = Object.keys(MEDS_DB).map(m => m.toLowerCase());
    if (d.alertas_clinicos && d.alertas_clinicos.length) {
      // Filtrar: só mostrar alerta se o medicamento está na maleta
      const maletaNomes = (typeof MEDS !== 'undefined' ? MEDS : Object.keys(MEDS_DB)).map(m => m.toLowerCase());
      const alertasFiltrados = d.alertas_clinicos.filter(a => {
        const medLower = (a.medicamento || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
        // Verifica se algum medicamento da maleta aparece no alerta
        return maletaNomes.some(m => {
          const mNorm = m.normalize('NFD').replace(/[̀-ͯ]/g,'');
          return medLower.includes(mNorm.substring(0,6)) || mNorm.includes(medLower.substring(0,6));
        });
      });
      if (!alertasFiltrados.length) { window._recsParaVerDetalhe = []; }
      const itensAlertas = alertasFiltrados.map(a => {
        const isGrave = (a.gravidade || '').toLowerCase() === 'grave';
        const cor = isGrave ? '#E8323C' : '#F5C842';
        const bg  = isGrave ? 'rgba(232,50,60,0.08)' : 'rgba(245,200,66,0.08)';
        const bord = isGrave ? 'rgba(232,50,60,0.35)' : 'rgba(245,200,66,0.35)';
        const icon = isGrave ? '🚫' : '⚠️';
        return `<div style="padding:8px 10px;border-radius:7px;background:${bg};border:1px solid ${bord};margin-bottom:6px">`
          + `<div style="font-size:12px;font-weight:800;color:${cor};margin-bottom:3px">${icon} ${a.medicamento}</div>`
          + `<div style="font-size:11px;color:var(--text);line-height:1.4;opacity:.9">${a.motivo}</div>`
          + `</div>`;
      }).join('');
      if (alertasFiltrados.length) {
        html += `<div class="an-conduta" style="border-color:rgba(232,50,60,0.3)">`
          + `<div class="an-conduta-header" style="color:#E8323C">⚠️ Alertas Clínicos — Cautela ao Medicar</div>`
          + `<div class="an-conduta-body" style="padding:8px 13px">${itensAlertas}</div>`
          + `</div>`;
      }
    }
    // Sem recomendações de maleta
    window._recsParaVerDetalhe = [];

    html += `<div class="an-disclaimer">⚠️ Suporte de decisão — não substitui avaliação médica. Confirme com regulação médica.</div>`;

    // Salvar dados do paciente em globais antes do painel ser substituído
    window._dadosPacienteCache = {
      nome:   (document.getElementById('anNome')          || {value:''}).value.trim(),
      sinais: (document.getElementById('anSinais')        || {value:''}).value.trim(),
      comorb: (document.getElementById('anComorbidades')  || {value:''}).value.trim(),
      queixa: (document.getElementById('anQueixa')        || {value:''}).value.trim(),
    };
    _pacNome = window._dadosPacienteCache.nome;

    _ultimaAnalise = {
      classes: d.classes_medicamentos || [],
      hipotese: (d.hipotese_pontos || [d.hipotese_curta || d.hipotese_diagnostica || '']).join(' · '),
      hipotesePontos: d.hipotese_pontos || [],
      hipoteseDetalhe: d.hipotese_detalhada || '',
      alertas: d.alertas_clinicos || []
    };

    res.innerHTML = html;

  } catch(e) {
    res.innerHTML = `<div class="error-box">❌ Erro: ${e.message}</div>`;
  }

  btn.disabled = false;
}

function normalizarTexto(str) {
  return str.normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase();
}

function checarContraindicacoes(nomeMed) {
  const comorbRaw = normalizarTexto((document.getElementById('anComorbidades') || {value:''}).value.trim());
  if (!comorbRaw) return null;
  const componentes = COMPOSICAO_MAP[nomeMed] || [];
  const nomes_legíveis = {
    'hemofil': 'Hemofilia', 'coagulação': 'Distúrbio de coagulação',
    'anticoagul': 'Uso de anticoagulante', 'ulcera': 'Úlcera péptica',
    'renal': 'Insuficiência renal', 'asma': 'Asma/DPOC',
    'parkinson': 'Doença de Parkinson', 'gestante': 'Gestante',
    'gravidez': 'Gravidez', 'epilep': 'Epilepsia',
    'bradicard': 'Bradicardia', 'hipotens': 'Hipotensão',
    'hepat': 'Hepatopatia', 'alcool': 'Intoxicação alcoólica',
  };
  const alertas = [];
  for (const [termo, meds] of Object.entries(CONTRAINDICACAO_MAP)) {
    const bateMed = meds.some(m => m.toLowerCase() === nomeMed.toLowerCase());
    const bateComponente = componentes.some(comp => meds.some(m => m.toLowerCase() === comp.toLowerCase()));
    if (comorbRaw.includes(normalizarTexto(termo)) && (bateMed || bateComponente)) {
      const label = nomes_legíveis[termo] || formatarTexto(termo);
      alertas.push({termo, label});
    }
  }
  if (!alertas.length) return null;

  // Buscar explicação detalhada se disponível
  const explicacoes = [];
  for (const {termo, label} of alertas) {
    const expMapa = CONTRA_EXPLICACAO[termo];
    if (expMapa && expMapa[nomeMed]) {
      explicacoes.push(`<span style="color:#E8323C;font-weight:800">${label}:</span> ${expMapa[nomeMed]}`);
    } else {
      explicacoes.push(`<span style="color:#E8323C;font-weight:800">${label}</span> identificado nas comorbidades`);
    }
  }
  return `⚠️ <strong>${nomeMed}</strong> — ${explicacoes.join(' · ')}`;
}

  _recsMarcaradas = new Set();

    const cb = document.getElementById('rec_' + i);
    if (cb && cb.checked) _recsMarcaradas.add(m.nome || m);
  });
  selecionados.clear();
  _recsMarcaradas.forEach(n => selecionados.add(n));
  if (!selecionados.size && _recsMarcaradas.size === 0) return;
  if (!selecionados.size) { alert('Selecione ao menos uma medicação.'); return; }

  const cache = window._dadosPacienteCache || {};
  _pacNome = (document.getElementById('anNome') || {value:''}).value.trim() || cache.nome || _pacNome || '';
  const _sv = (document.getElementById('anSinais') || {value:''}).value.trim() || cache.sinais || '';
  const _co = (document.getElementById('anComorbidades') || {value:''}).value.trim() || cache.comorb || '';
  const _qx = (document.getElementById('anQueixa') || {value:''}).value.trim() || cache.queixa || '';
  _pacQueixa = [_sv, _co, _qx].filter(Boolean).join(' | ');

  const nomes = [...selecionados];
  const panel = document.getElementById('panel-analise');
  window._analiseHtmlAnterior = panel.innerHTML;

  let html = '<button class="btn-voltar" onclick="restaurarAnalise()">← Voltar à análise</button>';

  // Dados do paciente
  let dadosPac = '';
  const _fN = formatarTexto(_pacNome); const _fS = formatarTexto(_sv);
  const _fC = formatarTexto(_co); const _fQ = formatarTexto(_qx);
  const l1d = [_fN ? '👤 <strong>' + _fN + '</strong>' : '', _fS ? '📊 ' + _fS : ''].filter(Boolean).join(' &nbsp;·&nbsp; ');
  if (l1d) dadosPac += '<div style="font-size:12px;color:var(--text);margin-bottom:3px">' + l1d + '</div>';
  const l2d = [_fC ? '🏥 ' + _fC : '', _fQ ? '🗣 ' + _fQ : ''].filter(Boolean).join(' &nbsp;·&nbsp; ');
  if (l2d) dadosPac += '<div style="font-size:12px;color:var(--text);margin-bottom:3px">' + l2d + '</div>';
  dadosPac += '<div style="font-size:12px;color:var(--accent);margin-top:2px">💊 ' + nomes.join(', ') + '</div>';
  html += '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:10px">' + dadosPac + '</div>';

  nomes.forEach(function(nome) { html += buildCardFromDB(nome); });

  const compat = checarCompatibilidadeLocal(nomes);
  if (compat) html += '<div class="compat-card"><div class="compat-header">🔀 Podem ir no mesmo frasco?</div><div class="compat-body">' + compat + '</div></div>';

  panel.innerHTML = html;
  window.scrollTo(0, 0);
  const sf = document.getElementById('salvarFixoWrap');
  if (sf) sf.style.display = 'block';
}


function restaurarAnalise() {
  if (window._analiseHtmlAnterior) {
    document.getElementById('panel-analise').innerHTML = window._analiseHtmlAnterior;
    window._analiseHtmlAnterior = null;
    // Repor valores dos campos
    const fn = document.getElementById('anNome');       if (fn) fn.value = _campoPaciente.nome;
    const fs = document.getElementById('anSinais');     if (fs) fs.value = _campoPaciente.sinais;
    const fc = document.getElementById('anComorbidades'); if (fc) fc.value = _campoPaciente.comorb;
    const fq = document.getElementById('anQueixa');     if (fq) fq.value = _campoPaciente.queixa;
    // Repor checkboxes
    Object.entries(_checkboxState).forEach(([id, checked]) => {
      const cb = document.getElementById(id);
      if (cb) cb.checked = checked;
    });
    // Rolar para as recomendadas
    setTimeout(() => {
      const res = document.getElementById('anResult');
      if (res) res.scrollIntoView({behavior:'smooth', block:'start'});
    }, 50);
  }
}

      const mT = !termo || d.meds[0].toLowerCase().includes(termo) || d.meds[1].toLowerCase().includes(termo);

    '<input id="_interSearch" type="text" placeholder="Buscar medicamento..." style="width:100%;box-sizing:border-box;background:#1C2637;border:1px solid #2A3A52;border-radius:8px;padding:8px 11px;color:#E8EFF8;font-family:Inter,sans-serif;font-size:12px;outline:none;margin-bottom:10px">' +
    '<div style="display:flex;gap:6px;margin-bottom:10px">' +
      '<button data-f="todos" style="flex:1;padding:6px;border-radius:20px;border:1px solid #2A3A52;background:#1C2637;color:#E8EFF8;font-size:11px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif" class="_fBtn">Todos</button>' +
      '<button data-f="grave" style="flex:1;padding:6px;border-radius:20px;border:1px solid rgba(232,50,60,0.4);background:rgba(232,50,60,0.1);color:#E8323C;font-size:11px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif" class="_fBtn">🚨 Graves</button>' +
      '<button data-f="moderada" style="flex:1;padding:6px;border-radius:20px;border:1px solid rgba(245,200,66,0.4);background:rgba(245,200,66,0.1);color:#F5C842;font-size:11px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif" class="_fBtn">⚠️ Moderadas</button></div>' +
    '<div id="_interLista" style="overflow-y:auto;flex:1">' + renderLista('todos','') + '</div></div>';
  document.body.appendChild(overlay);
  let filtroAtivo = 'todos';
  overlay.querySelector('#_btnFecharInter').onclick = () => overlay.remove();
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  overlay.querySelectorAll('._fBtn').forEach(btn => {

      filtroAtivo = btn.getAttribute('data-f');
      const termo = overlay.querySelector('#_interSearch').value.toLowerCase();

  };
}

      if (inter) alertas.push(inter);

function calcularStats(atds) {

  if (!painel || !grid || !atds.length) {
    if (painel) painel.style.display = 'none';
    return;
  }
  painel.style.display = 'block';

  // Total
  const total = atds.length;

  // Medicamentos mais usados
  const medsCount = {};
  atds.forEach(a => {
    if (!a.meds) return;
    a.meds.split(',').map(m => m.trim()).filter(Boolean).forEach(m => {
      medsCount[m] = (medsCount[m] || 0) + 1;
    });
  });
  const medsOrdenados = Object.entries(medsCount).sort((a,b) => b[1]-a[1]);
  const top4 = medsOrdenados.slice(0,4);
  const linhas = top4.length ? top4.map(([n,c],i)=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:${i<top4.length-1?'1px solid var(--border)':'none'}"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i+1}. ${n}</span><strong>${c}x</strong></div>`).join('') : '<div>—</div>';

  grid.innerHTML=`<div style="display:flex;gap:10px;width:100%;align-items:stretch">
<div style="flex:0 0 120px;background:var(--surface3);border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:center;align-items:center">

}
